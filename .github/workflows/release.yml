name: Release

# Ships a new image whenever the "version" field in package.json changes on main.
# Bump the version locally (e.g. `npm version patch` / `minor` / `major`) and push
# to main; this workflow verifies, tags the release, and pushes the image to
# Docker Hub. No version change -> nothing runs.
on:
  push:
    branches: [main]
    # Only wake the workflow when package.json is touched; the version job then
    # confirms the "version" field actually changed before anything ships.
    paths:
      - "package.json"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Need the previous commit to diff the version field.
          fetch-depth: 2

      - id: check
        name: Compare package.json version against previous commit
        run: |
          current=$(node -p "require('./package.json').version")
          echo "version=$current" >> "$GITHUB_OUTPUT"
          if git cat-file -e HEAD~1:package.json 2>/dev/null; then
            previous=$(git show HEAD~1:package.json \
              | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          else
            previous=""
          fi
          echo "previous='$previous' current='$current'"
          if [ "$current" != "$previous" ]; then
            echo "Version changed -> release will run."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged -> nothing to release."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Lint, typecheck, test
    needs: version
    if: needs.version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      # `npm install`, not `npm ci`: package-lock.json is generated on Windows and
      # omits Linux-only optional native deps (@emnapi/*, sharp/lightningcss musl
      # builds), which `npm ci`'s strict sync check rejects. Mirrors the Dockerfile.
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  release:
    name: Tag and publish image
    needs: [version, verify]
    if: needs.version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      # Required so the workflow can push the release tag back to the repo.
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v5

      - name: Create and push release tag
        run: |
          tag="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin, skipping tag creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:latest
          # Reuse layers across runs to keep rebuilds fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
